<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Invoices / Quotations / PO Numbers</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .inv-wrap{
      display:grid;
      grid-template-columns: 420px 1fr;
      gap:16px;
    }

    @media (max-width: 980px){
      .inv-wrap{
        grid-template-columns:1fr;
      }
    }

    .inv-card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:18px;
      box-shadow:0 10px 28px rgba(15,23,42,.06);
    }

    .inv-title{
      margin:0 0 8px;
      font-size:18px;
      font-weight:700;
    }

    .inv-sub{
      margin:0 0 16px;
      font-size:13px;
      color:#64748b;
    }

    .seg{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .seg button{
      min-width:90px;
    }

    .seg .active{
      background: rgba(37,99,235,.14);
      color: var(--accent);
      border-color: rgba(37,99,235,.40);
    }

    .big-number-box{
      border:1px solid #dbe3f0;
      border-radius:18px;
      padding:22px 16px;
      background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
      text-align:center;
      margin-bottom:16px;
    }

    .big-number-label{
      font-size:12px;
      color:#64748b;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .big-number{
      font-size:28px;
      font-weight:800;
      color:#0f172a;
      word-break:break-word;
    }

    .inv-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .inv-actions .btn{
      flex:1;
      min-width:130px;
    }

    .field-block{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid #e5e7eb;
    }

    .field-block h4{
      margin:0 0 10px;
      font-size:14px;
    }

    .field-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .field-row input{
      flex:1;
      min-width:220px;
    }

    .result-box{
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      border:1px solid #e5e7eb;
      background:#f8fafc;
      font-size:13px;
      color:#334155;
    }

    .history-box{
      max-height:560px;
      overflow:auto;
      border:1px solid #e5e7eb;
      border-radius:16px;
      background:#fff;
    }

    .history-item{
      padding:14px;
      border-bottom:1px solid #eef2f7;
    }

    .history-item:last-child{
      border-bottom:none;
    }

    .history-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .history-number{
      font-weight:800;
      color:#0f172a;
    }

    .history-meta{
      font-size:12px;
      color:#64748b;
      margin-top:4px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid #e5e7eb;
      background:#fff;
    }

    .status-reserved{
      background:#eff6ff;
      color:#1d4ed8;
      border-color:#bfdbfe;
    }

    .status-used{
      background:#ecfdf5;
      color:#047857;
      border-color:#bbf7d0;
    }

    .status-restored{
      background:#fff7ed;
      color:#c2410c;
      border-color:#fed7aa;
    }

    .modal-backdrop{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.45);
      z-index:999;
    }

    .modal-backdrop.open{
      display:block;
    }

    .modal-card{
      max-width:520px;
      margin:70px auto;
      background:#fff;
      border-radius:18px;
      padding:22px;
      box-shadow:0 20px 50px rgba(0,0,0,.15);
    }

    .modal-card h3{
      margin:0 0 10px;
    }

    .modal-card p{
      margin:0 0 14px;
      color:#475569;
      line-height:1.45;
    }

    .copied-number{
      padding:14px;
      border-radius:14px;
      background:#f8fafc;
      border:1px solid #dbe3f0;
      font-size:20px;
      font-weight:800;
      text-align:center;
      margin-bottom:16px;
      word-break:break-word;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .modal-actions .btn{
      flex:1;
      min-width:150px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h2>Invoices / Quotations / PO Numbers</h2>
      <p class="sub">Logged in as <b>{{ user }}</b> ({{ role }})</p>
    </div>
    <div class="row">
      <a class="btn ghost" href="/dashboard">⬅ Back</a>
      <a class="btn ghost" href="/logout">Logout</a>
    </div>
  </div>

  <div class="page" style="grid-template-columns:1fr;">
    <div class="inv-wrap">

      <div class="inv-card">
        <h3 class="inv-title">Live Number Generator</h3>

        <div class="seg">
          <button id="typeINV" class="btn active" type="button">Invoice</button>
          <button id="typeQT" class="btn ghost" type="button">Quotation</button>
          <button id="typePO" class="btn ghost" type="button">PO</button>
        </div>

        <div class="big-number-box">
          <div class="big-number-label">Current Available Number</div>
          <div id="liveNumber" class="big-number">Loading...</div>
        </div>

        <div class="inv-actions">
          <button id="copyBtn" class="btn" type="button">Copy Number</button>
          <button id="refreshBtn" class="btn ghost" type="button">Refresh</button>
        </div>

        <p id="topMsg" class="msg"></p>

        <div class="field-block">
          <h4>Restore Number</h4>
          <div class="field-row">
            <input id="restoreInput" type="text" />
            <button id="restoreBtn" class="btn ghost" type="button">Restore</button>
          </div>
          <p id="restoreMsg" class="msg"></p>
        </div>

        <div class="field-block">
          <h4>Search Number</h4>
          <div class="field-row">
            <input id="searchInput" type="text" />
            <button id="searchBtn" class="btn ghost" type="button">Search</button>
          </div>
          <div id="searchResult" class="result-box"></div>
        </div>
      </div>

      <div class="inv-card">
        <h3 class="inv-title">Status</h3>

        <div class="history-box">
          <div class="history-item">
            <div class="history-top">
              <div>
                <div class="history-number">RESERVED</div>
              </div>
              <span class="status-pill status-reserved">RESERVED</span>
            </div>
          </div>

          <div class="history-item">
            <div class="history-top">
              <div>
                <div class="history-number">USED</div>
              </div>
              <span class="status-pill status-used">USED</span>
            </div>
          </div>

          <div class="history-item">
            <div class="history-top">
              <div>
                <div class="history-number">RESTORED</div>
              </div>
              <span class="status-pill status-restored">RESTORED</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="copyModal" class="modal-backdrop">
    <div class="modal-card">
      <h3>Number Copied</h3>
      <div id="copiedNumberText" class="copied-number">-</div>
      <div class="modal-actions">
        <button id="copyOkBtn" class="btn" type="button">OK</button>
        <button id="copyUndoBtn" class="btn ghost" type="button">Undo & Cancel</button>
      </div>
      <p id="copyModalMsg" class="msg"></p>
    </div>
  </div>

  <div id="restoreModal" class="modal-backdrop">
    <div class="modal-card">
      <h3>Restore Number</h3>
      <div id="restoreModalNumber" class="copied-number">-</div>
      <div class="modal-actions">
        <button id="restoreOkBtn" class="btn" type="button">OK</button>
        <button id="restoreCancelBtn" class="btn ghost" type="button">Undo & Cancel</button>
      </div>
      <p id="restoreModalMsg" class="msg"></p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/invoices.js') }}"></script>
</body>
</html>
