<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="topbar">
    <div>
      <h2>Admin Dashboard</h2>
      <p class="sub">Welcome, <b>{{ user }}</b> • Role: <b>{{ role }}</b></p>
    </div>
    <a class="btn ghost" href="/logout">Logout</a>
  </div>

  <div class="page" style="grid-template-columns:1fr;">
    <div class="panel wide">
      <h3>Modules</h3>

      <div class="cards">
        <a class="card" href="/finance">
          <h4>Finance</h4>
        </a>

        <a class="card" href="/document-storage">
          <h4>Document Storage</h4>
        </a>

        <a class="card" href="/users">
          <h4>Employee Access</h4>
        </a>

        <a class="card" href="/weekly-tasks" style="position:relative;">
          <h4>Weekly Tasks</h4>
          <span id="weeklyTasksBadge" style="display:none; position:absolute; top:10px; right:10px; min-width:22px; height:22px; border-radius:999px; background:#dc2626; color:#fff; font-size:12px; font-weight:700; align-items:center; justify-content:center; padding:0 6px;">0</span>
        </a>

        <a class="card" href="/invoices">
          <h4>Invoices</h4>
        </a>

        <a class="card" href="/cash-advances">
          <h4>Cash Advances</h4>
        </a>

        <a class="card" href="/messages" style="position:relative;">
          <h4>Messages</h4>
          <span id="msgBadge" style="display:none; position:absolute; top:10px; right:10px; min-width:22px; height:22px; border-radius:999px; background:#dc2626; color:#fff; font-size:12px; font-weight:700; align-items:center; justify-content:center; padding:0 6px;">0</span>
        </a>

        <a class="card" href="/calendar" style="position:relative;">
          <h4>Calendar</h4>
          <span id="calendarBadge" style="display:none; position:absolute; top:10px; right:10px; min-width:22px; height:22px; border-radius:999px; background:#dc2626; color:#fff; font-size:12px; font-weight:700; align-items:center; justify-content:center; padding:0 6px;">0</span>
        </a>

        <a class="card" href="/hs-codes">
          <h4>HS Codes</h4>
        </a>

        <a class="card" href="/worksheet">
          <h4>Worksheet</h4>
        </a>

        <a class="card" href="/attendance">
          <h4>Attendance</h4>
        </a>

        <a class="card" href="/marketing-emails">
          <h4>Marketing Emails</h4>
        </a>

        <a class="card" href="/notes" style="position:relative;">
          <h4>Notes</h4>
          <span id="notesBadge" style="display:none; position:absolute; top:10px; right:10px; min-width:22px; height:22px; border-radius:999px; background:#dc2626; color:#fff; font-size:12px; font-weight:700; align-items:center; justify-content:center; padding:0 6px;">0</span>
        </a>

        <a class="card" href="/finance-trash">
          <h4>Finance Trash</h4>
        </a>

        <div class="card disabled">
          <h4>Reports</h4>
          <p>Unavailable</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function safeJson(res){
      try { return await res.json(); }
      catch { return {}; }
    }

    async function loadMessageBadge(){
      try{
        if(document.hidden) return;
        const res = await fetch("/api/messages/unread-count", { credentials: "same-origin" });
        const out = await res.json();
        const count = Number(out?.data?.unread_count || 0);
        const badge = document.getElementById("msgBadge");
        if(!badge) return;

        if(count > 0){
          badge.style.display = "inline-flex";
          badge.textContent = count > 99 ? "99+" : String(count);
        }else{
          badge.style.display = "none";
          badge.textContent = "0";
        }
      }catch(e){}
    }

    async function loadCalendarBadge(){
      try{
        if(document.hidden) return;
        const res = await fetch("/api/messages/calendar-badge", { credentials: "same-origin" });
        const out = await safeJson(res);
        const count = Array.isArray(out?.data) ? out.data.length : 0;
        const badge = document.getElementById("calendarBadge");
        if(!badge) return;

        if(count > 0){
          badge.style.display = "inline-flex";
          badge.textContent = count > 99 ? "99+" : String(count);
        }else{
          badge.style.display = "none";
          badge.textContent = "0";
        }
      }catch(e){}
    }

    function updateBadge(id, count){
      const badge = document.getElementById(id);
      if(!badge) return;
      if(count > 0){
        badge.style.display = "inline-flex";
        badge.textContent = count > 99 ? "99+" : String(count);
      }else{
        badge.style.display = "none";
        badge.textContent = "0";
      }
    }

    async function loadNotesBadge(){
      try{
        if(document.hidden) return;
        const res = await fetch("/api/notes/notification-count", { credentials: "same-origin" });
        const out = await safeJson(res);
        const count = Number(out?.data?.notification_count || 0);
        updateBadge("notesBadge", count);
      }catch(e){}
    }

    async function loadWeeklyTasksBadge(){
      try{
        if(document.hidden) return;
        const res = await fetch("/api/weekly-tasks/notification-count", { credentials: "same-origin" });
        const out = await safeJson(res);
        const count = Number(out?.data?.notification_count || 0);
        updateBadge("weeklyTasksBadge", count);
      }catch(e){}
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadMessageBadge();
      loadCalendarBadge();
      loadNotesBadge();
      loadWeeklyTasksBadge();

      setInterval(loadMessageBadge, 55000);
      setInterval(loadCalendarBadge, 45000);
      setInterval(loadNotesBadge, 30 * 60 * 1000);
      setInterval(loadWeeklyTasksBadge, 30 * 60 * 1000);

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          loadMessageBadge();
          loadCalendarBadge();
          loadNotesBadge();
          loadWeeklyTasksBadge();
        }
      });
    });
  </script>
</body>
</html>
