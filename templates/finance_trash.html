<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Finance Trash</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" href="https://theceylonspicehaven.com/img/Transparent%20logo.jpg" type="image/jpeg">
  <link rel="shortcut icon" href="https://theceylonspicehaven.com/img/Transparent%20logo.jpg">
  <style>
    .finance-trash-page{
      grid-template-columns: 1fr;
    }
    .finance-trash-panel{
      width: 100%;
      max-width: 100%;
    }
    .finance-trash-toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
    }
    .finance-trash-msg{
      margin-left:auto;
      min-height:22px;
    }
    .finance-trash-table-wrap{
      width:100%;
      overflow:auto;
    }
    .finance-trash-table{
      width:100%;
      min-width:1200px;
    }
    .finance-trash-table th,
    .finance-trash-table td{
      white-space:nowrap;
      padding:12px 14px;
    }
    .finance-trash-actions{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-start;
      flex-wrap:wrap;
    }
    @media (max-width: 768px){
      .finance-trash-msg{
        margin-left:0;
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h2>Finance Trash</h2>
    </div>
    <div class="row">
      <a class="btn ghost" href="/dashboard">Back</a>
      <a class="btn ghost" href="/logout">Logout</a>
    </div>
  </div>

  <div class="page finance-trash-page">
    <div class="panel wide finance-trash-panel">
      <div class="finance-trash-toolbar">
        <button class="btn ghost" id="refreshTrashBtn">Refresh</button>
        <button class="btn danger" id="purgeBtn">Purge Expired (30+ days)</button>
        <span id="msg" class="msg finance-trash-msg"></span>
      </div>

      <div class="hr"></div>

      <div class="tableWrap finance-trash-table-wrap">
        <table class="table finance-trash-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Bank</th>
              <th>Type</th>
              <th>Client</th>
              <th>Category</th>
              <th>Currency</th>
              <th>Amount</th>
              <th>Deleted At</th>
              <th>Deleted By</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="trashBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let ME = null;

    async function safeJson(res){
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      if(ct.includes("application/json")) return await res.json();
      const t = await res.text();
      throw new Error("Non-JSON response. " + (t||"").slice(0,80));
    }

    function msg(t, ok=true){
      const el = $("msg");
      if(!el) return;
      el.textContent = t;
      el.className = "msg " + (ok ? "ok" : "bad");
    }

    function safeText(v){ return (v===null||v===undefined) ? "" : String(v); }

    function canEditTrash(){
      if(!ME) return false;
      if(ME.role === "ADMIN") return true;
      const p = (ME.permissions || {})["FINANCE_TRASH"];
      return !!(p && Number(p.can_edit) === 1);
    }

    async function getMe(){
      const res = await fetch("/api/me");
      ME = await safeJson(res);

      // Hide purge button if user cannot edit trash
      const purgeBtn = $("purgeBtn");
      if(purgeBtn){
        purgeBtn.style.display = canEditTrash() ? "inline-block" : "none";
      }
    }

    async function loadTrash(){
      try{
        const res = await fetch("/api/finance/trash");
        const rows = await safeJson(res);

        const body = $("trashBody");
        body.innerHTML = "";

        const editable = canEditTrash();

        rows.forEach(r=>{
          const tr = document.createElement("tr");
          tr.classList.add("rowDeleted");

          const bankName = safeText(r.bank_name || ""); // will be empty if API doesn't join bank (ok)
          const actionHtml = editable
            ? `<div class="finance-trash-actions">
                 <button class="btn mini ok" data-restore="${r.id}">Restore</button>
                 <button class="btn danger mini" data-delete-forever="${r.id}">Delete Permanently</button>
               </div>`
            : `<span class="pill muted">View only</span>`;

          tr.innerHTML = `
            <td>${r.id}</td>
            <td>${bankName}</td>
            <td>${safeText(r.type)}</td>
            <td>${safeText(r.client_name)}</td>
            <td>${safeText(r.category)}</td>
            <td>${safeText(r.currency)}</td>
            <td><b>${Number(r.amount || 0).toFixed(2)}</b></td>
            <td>${safeText(r.deleted_at)}</td>
            <td>${safeText(r.deleted_by)}</td>
            <td>${actionHtml}</td>
          `;
          body.appendChild(tr);

          if(editable){
            const btn = tr.querySelector(`[data-restore="${r.id}"]`);
            const deleteBtn = tr.querySelector(`[data-delete-forever="${r.id}"]`);
            if(btn){
              btn.addEventListener("click", async ()=>{
                try{
                  const rr = await fetch(`/api/finance/${r.id}/restore`, { method: "POST" });
                  const out = await safeJson(rr);
                  if(!rr.ok) throw new Error(out.error || "Restore failed");
                  msg(`Restored record ${r.id}`, true);
                  await loadTrash();
                }catch(e){
                  msg(e.message, false);
                }
              });
            }
            if(deleteBtn){
              deleteBtn.addEventListener("click", async ()=>{
                if(!confirm("Are you sure? This cannot be undone.")) return;
                try{
                  const rr = await fetch(`/api/finance/${r.id}/delete-forever`, { method: "DELETE" });
                  const out = await safeJson(rr);
                  if(!rr.ok) throw new Error(out.error || "Permanent delete failed");
                  msg(`Permanently deleted record ${r.id}`, true);
                  await loadTrash();
                }catch(e){
                  msg(e.message, false);
                }
              });
            }
          }
        });

        msg(`Loaded ${rows.length} deleted records.`, true);
      }catch(e){
        msg(e.message, false);
      }
    }

    $("refreshTrashBtn").addEventListener("click", loadTrash);

    $("purgeBtn").addEventListener("click", async ()=>{
      if(!canEditTrash()){
        return msg("No permission to purge.", false);
      }
      if(!confirm("Permanently delete records that were deleted 30+ days ago?")) return;
      try{
        const res = await fetch("/api/finance/purge", { method: "POST" });
        const out = await safeJson(res);
        if(!res.ok) throw new Error(out.error || "Purge failed");
        msg("Purge complete.", true);
        await loadTrash();
      }catch(e){
        msg(e.message, false);
      }
    });

    // init
    (async ()=>{
      await getMe();
      await loadTrash();
    })();
  </script>
</body>
</html>
